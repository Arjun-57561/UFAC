name: Create Good First Issues

on:
  workflow_dispatch:
  push:
    branches:
      - copilot/create-10-good-first-issues
    paths:
      - .github/issue-templates/good-first-issues.json

permissions:
  issues: write
  contents: read

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create 10 good-first-issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const issues = JSON.parse(
              fs.readFileSync('.github/issue-templates/good-first-issues.json', 'utf8')
            );

            // Fetch existing open issues to avoid duplicates
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            const existingTitles = new Set(existing.map(i => i.title));

            console.log(`Creating up to ${issues.length} good-first-issues (skipping duplicates)...`);
            let createdCount = 0;

            for (const issue of issues) {
              if (existingTitles.has(issue.title)) {
                console.log(`Skipping (already exists): ${issue.title}`);
                continue;
              }
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issue.title,
                body: issue.body,
                labels: issue.labels
              });
              console.log(`Created issue #${created.data.number}: ${issue.title}`);
              createdCount++;
            }

            console.log(`Done! Created ${createdCount} new good-first-issues.`);
