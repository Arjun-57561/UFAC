name: Create Good First Issues

on:
  workflow_dispatch:
  push:
    branches:
      - copilot/create-10-good-first-issues
    paths:
      - .github/issue-templates/good-first-issues.json

permissions:
  issues: write
  contents: read

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create labels and issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const issues = JSON.parse(
              fs.readFileSync('.github/issue-templates/good-first-issues.json', 'utf8')
            );

            // Ensure all needed labels exist
            const labelDefs = {
              'testing':      { color: '0e8a16', description: 'Related to tests and test coverage' },
              'code quality': { color: 'e4e669', description: 'Code readability and maintainability' },
              'dependencies': { color: '0075ca', description: 'Dependency management and updates' },
              'frontend':     { color: 'c5def5', description: 'Related to the React/Next.js UI' },
              'refactoring':  { color: 'bfd4f2', description: 'Code restructuring without behaviour change' },
              'validation':   { color: 'f9d0c4', description: 'Input validation and data integrity' },
            };

            for (const [name, def] of Object.entries(labelDefs)) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name
                });
                console.log(`Label already exists: ${name}`);
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name,
                    color: def.color,
                    description: def.description
                  });
                  console.log(`Created label: ${name}`);
                } else {
                  throw e;
                }
              }
            }

            // Fetch existing open issues to avoid duplicates
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            const existingTitles = new Set(existing.map(i => i.title));

            console.log(`\nCreating up to ${issues.length} good-first-issues (skipping duplicates)...`);
            let createdCount = 0;

            for (const issue of issues) {
              if (existingTitles.has(issue.title)) {
                console.log(`Skipping (already exists): ${issue.title}`);
                continue;
              }
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issue.title,
                body: issue.body,
                labels: issue.labels
              });
              console.log(`Created issue #${created.data.number}: ${issue.title}`);
              createdCount++;
            }

            console.log(`\nDone! Created ${createdCount} new good-first-issues.`);
